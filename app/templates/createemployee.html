{% extends "base.html" %}

{% block title %}Create Employee | Example Ticketing System{% endblock %}

{% block content %}
<section class="mb-4">
    <h1 class="h3">Create an Employee</h1>
</section>

<a href="/employeemanagement/usermanagement" class="btn btn-secondary btn-lg">Users</a>
<a href="/employeemanagement/techmanagement" class="btn btn-secondary btn-lg">Techs</a>
<a href="#" class="btn btn-primary btn-lg">Create new employee</a>

<br>

<form method="POST" action="{{ url_for('main.createticket')}}">

    <br>

    <div class="form-group">
        <label for="employeeType">Employee Type</label>
        <select class="custom-select" name="employeeType" required>
            <option value="tech">Tech</option>
            <option value="user">User</option>
        </select>
    </div>

    <br>

    <div class="form-group">
        <label for="employeeName">Employee Name</label>
        <input type="text" id="employeeName">
    </div>

    <br>

    <button type="reset" class="btn" btn-secondary>Reset</button>
    <button type="submit" class="btn btn-primary">Next</button>
</form>
{% endblock %}
